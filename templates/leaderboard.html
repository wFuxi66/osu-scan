<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboards - osu!scan</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #fff;
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            color: #ff66aa;
        }

        /* Mode filter tabs */
        .mode-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-tab {
            padding: 6px 14px;
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #aeb2b8;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .mode-tab:hover {
            border-color: #e94560;
            color: #fff;
        }

        .mode-tab.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }

        /* Section tabs */
        .section-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .section-tab {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #aeb2b8;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .section-tab:hover {
            border-color: #e94560;
            color: #fff;
        }

        .section-tab.active {
            background: rgba(233, 69, 96, 0.15);
            border-color: #e94560;
            color: #fff;
        }

        /* Leaderboard sections */
        .leaderboard-section {
            display: none;
        }

        .leaderboard-section.active {
            display: block;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            table-layout: fixed;
        }

        th {
            background-color: #0f3460;
            color: white;
            padding: 12px;
            text-align: left;
        }

        th:nth-child(1) {
            width: 60px;
        }

        th:nth-child(3) {
            width: 150px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #0f3460;
            color: inherit;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody tr {
            color: #e0e0e0;
        }

        tr:nth-child(even) {
            background-color: rgba(15, 52, 96, 0.3);
        }

        tr:hover {
            background-color: rgba(233, 69, 96, 0.15);
        }

        .rank-gold {
            color: #ffd700;
            font-weight: bold;
        }

        .rank-silver {
            color: #c0c0c0;
            font-weight: bold;
        }

        .rank-bronze {
            color: #cd7f32;
            font-weight: bold;
        }

        .username-link {
            color: inherit;
            text-decoration: none;
        }

        .username-link:hover {
            color: #ff66aa;
            text-decoration: underline;
        }

        .mode-icon {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            opacity: 0.75;
        }

        .mode-icons {
            display: inline-flex;
            gap: 3px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .duo-separator {
            color: #e94560;
            margin: 0 4px;
        }

        .scan-info {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }

        .no-data {
            padding: 30px;
            color: #666;
            font-size: 15px;
        }

        /* Search bar */
        .search-form {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            border-color: #e94560;
        }

        .search-btn {
            padding: 10px 16px;
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            border-radius: 6px;
            color: #e94560;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: #e94560;
            color: #fff;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            user-select: none;
        }

        .pagination-btn {
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            color: #aeb2b8;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .pagination-btn:hover {
            border-color: #e94560;
            color: #fff;
        }

        .pagination-btn.disabled {
            opacity: 0.35;
            pointer-events: none;
        }

        .pagination-info {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #aeb2b8;
            font-size: 14px;
        }

        .page-input {
            width: 42px;
            text-align: center;
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            padding: 4px;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .page-input::-webkit-outer-spin-button,
        .page-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .page-input:focus {
            border-color: #e94560;
        }

        /* Ko-fi Support Button */
        .kofi-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff66aa 0%, #e94560 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
            margin-left: 8px;
        }

        .kofi-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.5);
            background: linear-gradient(135deg, #ff7ab8 0%, #ff2e63 100%);
        }

        .loading-msg {
            text-align: center;
            padding: 40px;
            color: #aeb2b8;
            font-size: 15px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                width: 100%;
                box-sizing: border-box;
            }

            h1 {
                font-size: 22px;
            }

            table {
                font-size: 14px;
                white-space: nowrap;
            }

            th,
            td {
                padding: 8px 5px;
            }

            .mode-tabs {
                gap: 4px;
            }

            .mode-tab {
                padding: 5px 10px;
                font-size: 12px;
            }

            .page-input {
                width: 36px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link">← Back to osu!scan</a>

        <h1>Global Leaderboards</h1>

        <div id="loading" class="loading-msg">Loading leaderboard data...</div>

        <div id="leaderboard-content" style="display:none;">
            <!-- Mode filter -->
            <div class="mode-tabs" id="mode-tabs">
                <div class="mode-tab active" data-mode="all">All</div>
                <div class="mode-tab" data-mode="osu">osu!</div>
                <div class="mode-tab" data-mode="taiko">Taiko</div>
                <div class="mode-tab" data-mode="catch">Catch</div>
                <div class="mode-tab" data-mode="mania">Mania</div>
            </div>

            <!-- Section tabs -->
            <div class="section-tabs" id="section-tabs">
                <div class="section-tab active" data-section="bns">Top BNs</div>
                <div class="section-tab" data-section="duos">Iconic BNs Duos</div>
            </div>

            <!-- Top BNs -->
            <div id="section-bns" class="leaderboard-section active">
                <div class="search-form">
                    <input type="text" class="search-input" id="search-bns" placeholder="Search a nominator..."
                        autocomplete="off">
                    <button class="search-btn" id="search-bns-btn">Search</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nominator</th>
                                <th>Nominations</th>
                            </tr>
                        </thead>
                        <tbody id="bns-tbody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="bns-pagination"></div>
            </div>

            <!-- Iconic BNs Duos -->
            <div id="section-duos" class="leaderboard-section">
                <div class="search-form">
                    <input type="text" class="search-input" id="search-duos" placeholder="Search a duo..."
                        autocomplete="off">
                    <button class="search-btn" id="search-duos-btn">Search</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead id="duos-thead">
                            <tr>
                                <th>#</th>
                                <th>Duo</th>
                                <th>Mode</th>
                                <th>Maps Together</th>
                            </tr>
                        </thead>
                        <tbody id="duos-tbody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="duos-pagination"></div>
            </div>

            <div class="scan-info" id="scan-info"></div>
        </div>

        <div id="no-data" class="no-data" style="display:none;">
            No leaderboard data available yet. Scan has not been run.
        </div>

        <div style="margin-top: 40px; text-align: center; font-size: 12px; color: #666;">
            Made by <a href="https://osu.ppy.sh/users/24230576"
                style="color: #ff66aa; text-decoration: none;">Fuxi66</a>
            - Data from <a href="https://osu.ppy.sh" style="color: #ff66aa; text-decoration: none;">osu!</a>
            and <a href="https://bn.mappersguild.com" style="color: #ff66aa; text-decoration: none;">Mapper's Guild</a>
            - <a href="https://ko-fi.com/fuxi66" target="_blank" class="kofi-btn">Support</a>
        </div>
    </div>

    <script>
        const PER_PAGE = 50;

        // State
        let rawData = null;
        let currentMode = 'all';
        let currentSection = 'bns';
        let searchBns = '';
        let searchDuos = '';
        let pageBns = 1;
        let pageDuos = 1;

        // Read initial state from URL
        (function readURL() {
            const p = new URLSearchParams(window.location.search);
            if (p.get('mode')) currentMode = p.get('mode');
            if (p.get('section')) currentSection = p.get('section');
        })();

        // Fetch data once
        fetch('/api/leaderboard_data')
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (!data) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }
                rawData = data;
                document.getElementById('leaderboard-content').style.display = 'block';
                initUI();
                render();
            })
            .catch(() => {
                document.getElementById('loading').textContent = 'Failed to load data.';
            });

        function initUI() {
            // Mode tabs
            document.querySelectorAll('.mode-tab').forEach(tab => {
                if (tab.dataset.mode === currentMode) tab.classList.add('active');
                else tab.classList.remove('active');
                tab.addEventListener('click', () => {
                    currentMode = tab.dataset.mode;
                    pageBns = 1;
                    pageDuos = 1;
                    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    updateURL();
                    render();
                });
            });

            // Section tabs
            document.querySelectorAll('.section-tab').forEach(tab => {
                if (tab.dataset.section === currentSection) tab.classList.add('active');
                else tab.classList.remove('active');
                tab.addEventListener('click', () => {
                    currentSection = tab.dataset.section;
                    document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.leaderboard-section').forEach(s => s.classList.remove('active'));
                    document.getElementById('section-' + currentSection).classList.add('active');
                    updateURL();
                });
            });

            // Show correct section
            document.querySelectorAll('.leaderboard-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + currentSection).classList.add('active');

            // Search - BNs
            const searchBnsInput = document.getElementById('search-bns');
            const searchBnsBtn = document.getElementById('search-bns-btn');
            searchBnsBtn.addEventListener('click', () => {
                searchBns = searchBnsInput.value.trim().toLowerCase();
                pageBns = 1;
                render();
            });
            searchBnsInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); searchBnsBtn.click(); }
            });

            // Search - Duos
            const searchDuosInput = document.getElementById('search-duos');
            const searchDuosBtn = document.getElementById('search-duos-btn');
            searchDuosBtn.addEventListener('click', () => {
                searchDuos = searchDuosInput.value.trim().toLowerCase();
                pageDuos = 1;
                render();
            });
            searchDuosInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); searchDuosBtn.click(); }
            });
        }

        function updateURL() {
            const p = new URLSearchParams();
            if (currentMode !== 'all') p.set('mode', currentMode);
            if (currentSection !== 'bns') p.set('section', currentSection);
            const qs = p.toString();
            history.replaceState(null, '', '/leaderboard' + (qs ? '?' + qs : ''));
        }

        const MODE_ICONS = {
            'osu': 'https://i.ppy.sh/7e7d307810cc1c87d72ef49aa8e00b0a532bf1a1/68747470733a2f2f6f73752e7070792e73682f77696b692f696d616765732f7368617265642f6d6f64652f6f73752e706e67',
            'taiko': 'https://i.ppy.sh/76642fc45fefd770b0f7ace30437e64309ae68bf/68747470733a2f2f6f73752e7070792e73682f77696b692f696d616765732f7368617265642f6d6f64652f7461696b6f2e706e67',
            'catch': 'https://i.ppy.sh/fbcd428c2342a50e24972fd5ba4c9bea8082c445/68747470733a2f2f6f73752e7070792e73682f77696b692f696d616765732f7368617265642f6d6f64652f63617463682e706e67',
            'fruits': 'https://i.ppy.sh/fbcd428c2342a50e24972fd5ba4c9bea8082c445/68747470733a2f2f6f73752e7070792e73682f77696b692f696d616765732f7368617265642f6d6f64652f63617463682e706e67',
            'mania': 'https://i.ppy.sh/06fedd0caf3d993b5e1a8a8686118de95722353c/68747470733a2f2f6f73752e7070792e73682f77696b692f696d616765732f7368617265642f6d6f64652f6d616e69612e706e67',
        };

        function modeIcon(mode) {
            const url = MODE_ICONS[mode];
            if (!url) return '';
            return `<img src="${url}" class="mode-icon" title="${mode}" alt="${mode}">`;
        }

        function rankClass(r) {
            if (r === 1) return 'rank-gold';
            if (r === 2) return 'rank-silver';
            if (r === 3) return 'rank-bronze';
            return '';
        }

        function escapeHTML(s) {
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        function render() {
            renderBNs();
            renderDuos();
            renderScanInfo();
        }

        function renderBNs() {
            const tbody = document.getElementById('bns-tbody');
            if (!rawData || !rawData.top_bns) { tbody.innerHTML = '<tr><td colspan="3" style="color:#666;text-align:center;padding:20px;">No results found.</td></tr>'; return; }

            // Build filtered list
            let bns = [];
            for (const bn of rawData.top_bns) {
                // Handle both 'catch' and 'fruits' in the old data
                let count = 0;
                if (currentMode === 'all') {
                    count = bn.total || 0;
                } else if (currentMode === 'catch') {
                    count = ((bn.by_mode || {}).catch || 0) + ((bn.by_mode || {}).fruits || 0);
                } else {
                    count = (bn.by_mode || {})[currentMode] || 0;
                }

                if (count > 0) bns.push({ ...bn, display_count: count });
            }
            bns.sort((a, b) => b.display_count - a.display_count);

            // Assign ranks before search filter
            for (let i = 0; i < bns.length; i++) bns[i].rank = i + 1;

            // Search filter (preserves ranks)
            if (searchBns) bns = bns.filter(b => (b.username || '').toLowerCase().includes(searchBns));

            // Pagination
            const total = bns.length;
            const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
            pageBns = Math.min(pageBns, totalPages);
            const page = bns.slice((pageBns - 1) * PER_PAGE, pageBns * PER_PAGE);

            // Render rows
            if (page.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="color:#666;text-align:center;padding:20px;">No results found.</td></tr>';
            } else {
                let html = '';
                for (const bn of page) {
                    const rc = rankClass(bn.rank);
                    // Show mode icons for all modes the BN participated in (when in All filter)
                    let icons = '';
                    if (currentMode === 'all') {
                        const modes = Object.keys(bn.by_mode || {}).filter(m => (bn.by_mode[m] || 0) > 0);
                        icons = modes.map(modeIcon).join('');
                    }
                    html += `<tr class="${rc}"><td>${bn.rank}</td><td><a href="https://osu.ppy.sh/users/${bn.osu_id}" target="_blank" class="username-link">${escapeHTML(bn.username)}</a>${icons ? '<span class="mode-icons">' + icons + '</span>' : ''}</td><td>${bn.display_count}</td></tr>`;
                }
                tbody.innerHTML = html;
            }

            // Pagination controls
            renderPagination('bns-pagination', pageBns, totalPages, p => { pageBns = p; render(); });
        }

        function renderDuos() {
            const tbody = document.getElementById('duos-tbody');
            const thead = document.getElementById('duos-thead');
            if (!rawData || !rawData.duos) { tbody.innerHTML = '<tr><td colspan="3" style="color:#666;text-align:center;padding:20px;">No results found.</td></tr>'; return; }

            // Always 3 columns - mode icon goes inline in the duo name cell
            thead.innerHTML = '<tr><th>#</th><th>Duo</th><th>Maps Together</th></tr>';

            // Filter by mode
            let duos = rawData.duos;
            if (currentMode !== 'all') {
                if (currentMode === 'catch') {
                    duos = duos.filter(d => d.mode === 'catch' || d.mode === 'fruits');
                } else {
                    duos = duos.filter(d => d.mode === currentMode);
                }
            }

            // Assign ranks
            for (let i = 0; i < duos.length; i++) duos[i].rank = i + 1;

            // Search filter
            if (searchDuos) duos = duos.filter(d => ((d.bn1_name || '') + ' ' + (d.bn2_name || '')).toLowerCase().includes(searchDuos));

            // Pagination
            const total = duos.length;
            const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
            pageDuos = Math.min(pageDuos, totalPages);
            const page = duos.slice((pageDuos - 1) * PER_PAGE, pageDuos * PER_PAGE);

            if (page.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="color:#666;text-align:center;padding:20px;">No results found.</td></tr>';
            } else {
                let html = '';
                for (const duo of page) {
                    const rc = rankClass(duo.rank);
                    // Show mode icon inline only in All mode
                    const icon = currentMode === 'all' ? modeIcon(duo.mode || '') : '';
                    html += `<tr class="${rc}"><td>${duo.rank}</td><td><a href="https://osu.ppy.sh/users/${duo.bn1_id}" target="_blank" class="username-link">${escapeHTML(duo.bn1_name)}</a><span class="duo-separator">x</span><a href="https://osu.ppy.sh/users/${duo.bn2_id}" target="_blank" class="username-link">${escapeHTML(duo.bn2_name)}</a>${icon ? ' ' + icon : ''}</td><td>${duo.count}</td></tr>`;
                }
                tbody.innerHTML = html;
            }

            // Pagination controls
            renderPagination('duos-pagination', pageDuos, totalPages, p => { pageDuos = p; render(); });
        }

        function renderPagination(containerId, currentPage, totalPages, onPageChange) {
            const container = document.getElementById(containerId);
            if (totalPages <= 1) { container.innerHTML = ''; return; }

            const prevDisabled = currentPage <= 1 ? 'disabled' : '';
            const nextDisabled = currentPage >= totalPages ? 'disabled' : '';

            container.innerHTML = `
                <span class="pagination-btn ${prevDisabled}" id="${containerId}-prev">&#9664;</span>
                <span class="pagination-info">
                    Page <input type="number" class="page-input" id="${containerId}-input" value="${currentPage}" min="1" max="${totalPages}"> / ${totalPages}
                </span>
                <span class="pagination-btn ${nextDisabled}" id="${containerId}-next">&#9654;</span>
            `;

            document.getElementById(`${containerId}-prev`).addEventListener('click', () => {
                if (currentPage > 1) onPageChange(currentPage - 1);
            });
            document.getElementById(`${containerId}-next`).addEventListener('click', () => {
                if (currentPage < totalPages) onPageChange(currentPage + 1);
            });

            const pageInput = document.getElementById(`${containerId}-input`);
            const jumpTo = () => {
                let val = parseInt(pageInput.value, 10);
                if (isNaN(val) || val < 1) val = 1;
                if (val > totalPages) val = totalPages;
                if (val !== currentPage) onPageChange(val);
            };
            pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); jumpTo(); } });
            pageInput.addEventListener('blur', jumpTo);
        }

        function renderScanInfo() {
            const el = document.getElementById('scan-info');
            if (!rawData) { el.textContent = ''; return; }

            let lastScan = 'Never';
            if (rawData.last_scan) {
                try {
                    const dt = new Date(rawData.last_scan);
                    lastScan = dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' + dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                } catch (e) {
                    lastScan = rawData.last_scan;
                }
            }

            // Calculate 1st of next month for the next scheduled scan
            const now = new Date();
            const nextScanDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() + 1, 1, 0, 0, 0));
            const nextScanStr = nextScanDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

            el.innerHTML = `Last updated: ${lastScan} | ${rawData.total_bns_scanned || 0} BNs scanned, ${rawData.total_sets_scanned || 0} sets processed<br><span style="color: #4facfe; margin-top: 5px; display: inline-block;">Next automated scan: ${nextScanStr}</span>`;
        }
    </script>
</body>

</html>
